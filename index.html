<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Server List Generator PRO</title>
<link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;600&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-color: #0f172a;
    --panel-bg: rgba(30, 41, 59, 0.7);
    --border-color: rgba(255, 255, 255, 0.1);
    --text-main: #f8fafc;
    --text-muted: #94a3b8;
    --tmdb-color: #0ea5e9;
    --imdb-color: #f5c518;
    --success: #10b981;
    --error: #ef4444;
    --font-ui: 'Poppins', sans-serif;
    --font-mono: 'Fira Code', monospace;
  }
  
  * { box-sizing: border-box; }
  
  body {
    margin: 0;
    min-height: 100vh;
    background: radial-gradient(circle at top right, #1e293b, #0f172a);
    color: var(--text-main);
    font-family: var(--font-ui);
    padding: 40px 20px 80px;
  }
  
  .wrap { max-width: 1100px; margin: 0 auto; }
  
  h1 {
    font-size: 26px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 2px;
    margin: 0 0 30px;
    text-align: center;
    background: linear-gradient(90deg, var(--tmdb-color), var(--imdb-color));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    text-shadow: 0px 4px 20px rgba(0,0,0,0.5);
  }

  h2 {
    font-size: 16px;
    color: var(--text-muted);
    margin: 0 0 15px 0;
    text-transform: uppercase;
    letter-spacing: 1px;
    border-bottom: 1px solid var(--border-color);
    padding-bottom: 10px;
  }

  .panel {
    background: var(--panel-bg);
    border: 1px solid var(--border-color);
    border-radius: 16px;
    padding: 24px;
    backdrop-filter: blur(12px);
    box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    margin-bottom: 30px;
  }

  /* Search Grid Inputs */
  .search-inputs {
    display: grid;
    grid-template-columns: 2fr 1fr 1fr;
    gap: 15px;
    margin-bottom: 20px;
  }
  
  .inputs {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    margin-bottom: 20px;
  }
  
  @media(max-width: 768px) { 
    .inputs, .search-inputs { grid-template-columns: 1fr; } 
  }

  .field label {
    display: block;
    font-size: 12px;
    font-weight: 600;
    color: var(--text-muted);
    margin-bottom: 8px;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  
  .field input, .field select {
    width: 100%;
    background: rgba(15, 23, 42, 0.6);
    border: 2px solid var(--border-color);
    color: var(--text-main);
    padding: 12px 16px;
    border-radius: 10px;
    font-family: var(--font-ui);
    font-size: 14px;
    transition: all 0.3s ease;
    appearance: none; /* For select */
  }
  
  .field input:focus, .field select:focus { 
    outline: none; 
    border-color: var(--tmdb-color); 
    box-shadow: 0 0 15px rgba(14, 165, 233, 0.3);
  }
  
  .field.imdb input:focus { 
    border-color: var(--imdb-color); 
    box-shadow: 0 0 15px rgba(245, 197, 24, 0.3);
  }

  select option { background: var(--bg-color); color: var(--text-main); }

  button.go {
    width: 100%;
    background: linear-gradient(135deg, #3b82f6, #06b6d4);
    color: #fff;
    border: none;
    border-radius: 10px;
    padding: 14px;
    font-family: var(--font-ui);
    font-weight: 700;
    font-size: 15px;
    letter-spacing: 1px;
    cursor: pointer;
    transition: all 0.3s ease;
    box-shadow: 0 4px 15px rgba(14, 165, 233, 0.4);
  }
  
  button.go.search-btn { background: linear-gradient(135deg, #8b5cf6, #d946ef); box-shadow: 0 4px 15px rgba(139, 92, 246, 0.4); }
  button.go:hover { transform: translateY(-2px); filter: brightness(1.1); }
  button.go:active { transform: translateY(1px); }
  button.go:disabled { opacity: 0.6; cursor: not-allowed; }

  /* Movie Search Results Grid */
  .movie-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
    gap: 15px;
    margin-top: 25px;
    max-height: 400px;
    overflow-y: auto;
    padding-right: 10px;
  }
  .movie-grid.hidden { display: none; }
  
  /* Scrollbar */
  .movie-grid::-webkit-scrollbar { width: 8px; }
  .movie-grid::-webkit-scrollbar-track { background: rgba(0,0,0,0.2); border-radius: 4px; }
  .movie-grid::-webkit-scrollbar-thumb { background: var(--tmdb-color); border-radius: 4px; }

  .movie-card {
    background: rgba(0,0,0,0.3);
    border: 1px solid var(--border-color);
    border-radius: 10px;
    overflow: hidden;
    cursor: pointer;
    transition: transform 0.2s, border-color 0.2s;
    display: flex;
    flex-direction: column;
  }
  .movie-card:hover { transform: scale(1.05); border-color: var(--tmdb-color); box-shadow: 0 5px 15px rgba(14, 165, 233, 0.3); }
  .movie-card img { width: 100%; aspect-ratio: 2/3; object-fit: cover; background: #111; }
  .movie-info { padding: 10px; text-align: center; flex-grow: 1; display: flex; flex-direction: column; justify-content: center;}
  .movie-title { font-size: 12px; font-weight: 600; line-height: 1.3; margin-bottom: 4px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  .movie-year { font-size: 11px; color: var(--text-muted); font-family: var(--font-mono); }

  .status {
    text-align: center;
    font-size: 13px;
    font-weight: 500;
    margin-top: 15px;
    min-height: 20px;
    font-family: var(--font-mono);
  }
  .status.ok { color: var(--success); }
  .status.err { color: var(--error); }
  .status.busy { color: var(--tmdb-color); animation: pulse 1.5s infinite; }
  .search-status { font-size: 12px; text-align: center; margin-top: 10px; color: var(--text-muted); }

  @keyframes pulse { 0% { opacity: 0.6; } 50% { opacity: 1; } 100% { opacity: 0.6; } }

  .sections { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; align-items: start; }
  @media(max-width: 860px) { .sections { grid-template-columns: 1fr; } }

  .section-head { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; padding: 0 5px; }
  .tag { font-size: 12px; font-weight: 700; letter-spacing: 1px; padding: 6px 12px; border-radius: 8px; text-transform: uppercase; }
  .tag.tmdb { background: rgba(14, 165, 233, 0.15); color: var(--tmdb-color); border: 1px solid rgba(14, 165, 233, 0.3); }
  .tag.imdb { background: rgba(245, 197, 24, 0.15); color: var(--imdb-color); border: 1px solid rgba(245, 197, 24, 0.3); }
  
  .section-head .count { color: var(--text-muted); font-size: 13px; font-weight: 500; }
  .section-head .id-echo { color: var(--text-main); font-size: 13px; font-family: var(--font-mono); margin-left: auto; background: rgba(0,0,0,0.3); padding: 4px 10px; border-radius: 6px;}

  .list { background: rgba(15, 23, 42, 0.5); border: 1px solid var(--border-color); border-radius: 12px; overflow: hidden; }
  .row { display: flex; flex-wrap: wrap; align-items: center; gap: 10px 15px; padding: 16px; border-bottom: 1px solid var(--border-color); transition: background 0.2s ease; }
  .row:hover { background: rgba(255, 255, 255, 0.03); }
  .row:last-child { border-bottom: none; }
  
  .row .name { width: 140px; flex: none; color: var(--text-main); font-weight: 600; font-size: 14px; }
  .row .url { flex: 1 1 auto; min-width: 0; color: var(--text-muted); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-size: 13px; font-family: var(--font-mono); }
  .row .actions { display: flex; gap: 8px; flex: none; }
  
  .row button { background: rgba(255, 255, 255, 0.05); border: 1px solid var(--border-color); color: var(--text-main); font-family: var(--font-ui); font-weight: 500; font-size: 12px; padding: 6px 12px; border-radius: 6px; cursor: pointer; transition: all 0.2s ease; }
  .row button:hover { background: rgba(255,255,255,0.1); border-color: var(--text-muted); }
  .row button.copied { background: rgba(16, 185, 129, 0.2); color: var(--success); border-color: var(--success); }
  
  .empty { padding: 30px 20px; color: var(--text-muted); font-size: 14px; text-align: center; }

  .preview-wrap { margin-top: 30px; animation: fadeIn 0.4s ease; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  .preview-wrap.hidden { display: none; }
  
  .preview-bar { display: flex; justify-content: space-between; align-items: center; background: var(--panel-bg); padding: 12px 20px; border: 1px solid var(--border-color); border-bottom: none; border-radius: 12px 12px 0 0; font-family: var(--font-mono); font-size: 13px; color: var(--tmdb-color); }
  .preview-bar button { background: rgba(239, 68, 68, 0.1); border: 1px solid rgba(239, 68, 68, 0.3); color: #fca5a5; font-family: var(--font-ui); font-weight: 600; font-size: 12px; padding: 6px 16px; border-radius: 6px; cursor: pointer; }
  .preview-bar button:hover { background: rgba(239, 68, 68, 0.2); color: #fef2f2; }
  
  iframe { width: 100%; height: 600px; border: 1px solid var(--border-color); border-radius: 0 0 12px 12px; background: #000; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
</style>
</head>

  <div class="sections">

    </div>

    <div class="section">

  <div class="panel" style="margin-top:30px;">

        <label>TV TMDB ID</label>

      </div>
      <div class="field">
        <label>Season</label>
        <input id="seasonInput" type="number" placeholder="e.g. 1" value="1" autocomplete="off">
      </div>
      <div class="field">
        <label>Episode</label>
        <input id="episodeInput" type="number" placeholder="e.g. 1" value="1" autocomplete="off">
      </div>
    </div>
    <button class="go" id="tvBtn" onclick="generateTV()" style="background:linear-gradient(135deg,#10b981,#0ea5e9);">Generate TV Links</button>
    <div class="status" id="tvStatus">Enter a TV TMDB ID, season and episode.</div>
  </div>

  <div class="sections" style="grid-template-columns:1fr;">
    <div class="section">
      <div class="section-head">
        <span class="tag" style="background:rgba(16,185,129,0.15);color:#10b981;border:1px solid rgba(16,185,129,0.3);">TV / Anime Servers</span>

        <span class="id-echo" id="tvEcho">-</span>
      </div>
      <div class="list" id="tvList"></div>
    </div>
  </div>

  <div class="preview-wrap hidden" id="previewWrap">
    <div class="preview-bar">
      <span id="previewLabel"></span>
      <button onclick="closePreview()">Close Player</button>
    </div>
    <iframe id="previewFrame" src="about:blank" allowfullscreen sandbox="allow-scripts allow-same-origin allow-forms allow-popups"></iframe>
  </div>
</div>

  const lang = document.getElementById('searchLang').value;
  const statusEl = document.getElementById('searchStatus');
  const resultsEl = document.getElementById('searchResults');
  const btn = document.getElementById('searchBtn');

  if(!query && !year && !lang) {
    statusEl.textContent = "Please enter at least one search filter.";
    return;
  }

  btn.disabled = true;
  statusEl.textContent = "Searching...";
  resultsEl.classList.add('hidden');
  resultsEl.innerHTML = '';

  let url = '';
  // If user typed a specific name, use Search API. Otherwise, use Discover API to browse.
  if (query) {
    url = `https://api.themoviedb.org/3/search/movie?api_key=${API_KEY}&query=${encodeURIComponent(query)}&include_adult=false`;
    if(year) url += `&primary_release_year=${year}`;
  } else {
    url = `https://api.themoviedb.org/3/discover/movie?api_key=${API_KEY}&sort_by=popularity.desc&include_adult=false`;
    if(year) url += `&primary_release_year=${year}`;
    if(lang) url += `&with_original_language=${lang}`;
  }

  try {
    const res = await fetch(url);
    const data = await res.json();
    
    if(data.results && data.results.length > 0) {
      statusEl.textContent = `Found ${data.results.length} movies. Click one to generate links.`;
      
      data.results.forEach(movie => {
        const releaseYear = movie.release_date ? movie.release_date.split('-')[0] : 'N/A';
        const posterUrl = movie.poster_path ? IMAGE_BASE_URL + movie.poster_path : 'data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="200" height="300" style="background:%23222"><text x="50%" y="50%" fill="%23666" text-anchor="middle" dy=".3em">No Image</text></svg>';
        
        const card = document.createElement('div');
        card.className = 'movie-card';
        card.onclick = () => selectMovieFromSearch(movie.id, movie.title);
        card.innerHTML = `
          <img src="${posterUrl}" alt="${movie.title}" loading="lazy">
          <div class="movie-info">
            <div class="movie-title">${movie.title}</div>
            <div class="movie-year">${releaseYear}</div>
          </div>
        `;
        resultsEl.appendChild(card);
      });
      resultsEl.classList.remove('hidden');
    } else {
      statusEl.textContent = "No movies found matching your criteria.";
    }
  } catch(e) {
    statusEl.textContent = "Error fetching from TMDB: " + e.message;
  }
  
  btn.disabled = false;
}

// Automatically populate inputs and generate when a search result is clicked
function selectMovieFromSearch(tmdbId, title) {
  // Clear IMDB, set TMDB
  document.getElementById('tmdbInput').value = tmdbId;
  document.getElementById('imdbInput').value = '';
  
  setStatus(`Selected: ${title}. Generating lists...`, 'busy');
  
  // Smooth scroll to generator
  document.getElementById('generatorPanel').scrollIntoView({behavior: 'smooth'});
  
  // Trigger generation
  generate();
}

// --- Generator Logic ---
document.getElementById('tmdbInput').addEventListener('input', () => { document.getElementById('imdbInput').value = ''; });
document.getElementById('imdbInput').addEventListener('input', () => { document.getElementById('tmdbInput').value = ''; });

function extractTmdbId(raw){
  raw = (raw || '').trim();
  if(!raw) return null;
  let m = raw.match(/themoviedb\.org\/movie\/(\d+)/i);
  if(m) return m[1];
  m = raw.match(/(\d{1,9})/);
  return m ? m[1] : null;
}

function extractImdbId(raw){
  raw = (raw || '').trim();
  if(!raw) return null;
  let m = raw.match(/(tt\d{6,9})/i);
  return m ? m[1].toLowerCase() : null;
}

function setStatus(msg, cls){
  const el = document.getElementById('status');
  el.textContent = msg || '';
  el.className = 'status' + (cls ? ' ' + cls : '');
}

async function tmdbToImdb(tmdbId){
  const url = `https://api.themoviedb.org/3/movie/${tmdbId}/external_ids?api_key=${API_KEY}`;
  const res = await fetch(url);
  if(!res.ok) throw new Error(`TMDB lookup failed (${res.status})`);
  const data = await res.json();
  if(!data.imdb_id) throw new Error('No IMDB ID returned for this TMDB ID');
  return data.imdb_id;
}

async function imdbToTmdb(imdbId){
  const url = `https://api.themoviedb.org/3/find/${imdbId}?api_key=${API_KEY}&external_source=imdb_id`;
  const res = await fetch(url);
  if(!res.ok) throw new Error(`TMDB lookup failed (${res.status})`);
  const data = await res.json();
  const hit = (data.movie_results && data.movie_results[0]) || null;
  if(!hit) throw new Error('No TMDB match for this IMDB ID');
  return String(hit.id);
}

function row(name, url){
  const div = document.createElement('div');
  div.className = 'row';
  div.innerHTML = `
    <span class="name">${name}</span>
    <span class="url">${url}</span>
    <span class="actions">
      <button onclick="loadPreview('${name.replace(/'/g,"")}','${url}')">Play</button>
      <button onclick="copyUrl(this,'${url}')">Copy</button>
      <a href="${url}" target="_blank" rel="noopener"><button type="button">Open</button></a>
    </span>
  `;
  return div;
}

function renderTVList(tvId, season, episode) {
  const tvList = document.getElementById('tvList');
  tvList.innerHTML = '';
  if (tvId) {
    TV_SERVERS.forEach(s => tvList.appendChild(row(s.name, s.build(tvId, season, episode))));
    document.getElementById('tvCount').textContent = `${TV_SERVERS.length} servers`;
    document.getElementById('tvEcho').textContent = `TMDB: ${tvId} S${season}E${episode}`;
  } else {
    tvList.innerHTML = '<div class="empty">Enter a TV TMDB ID to build this list.</div>';
    document.getElementById('tvCount').textContent = '0 servers';
    document.getElementById('tvEcho').textContent = '-';
  }
}

function generateTV() {
  const raw = (document.getElementById('tvInput').value || '').trim();
  const season = document.getElementById('seasonInput').value || '1';
  const episode = document.getElementById('episodeInput').value || '1';
  const tvStatus = document.getElementById('tvStatus');

  let tvId = null;
  const m = raw.match(/(\d{1,9})/);
  if (m) tvId = m[1];

  if (!tvId) {
    tvStatus.textContent = 'Please enter a valid TV TMDB ID.';
    tvStatus.className = 'status err';
    renderTVList(null, season, episode);
    return;
  }
  tvStatus.textContent = `TV links generated for TMDB ${tvId} S${season}E${episode}.`;
  tvStatus.className = 'status ok';
  renderTVList(tvId, season, episode);
}

function renderLists(tmdbId, imdbId){
  const tmdbList = document.getElementById('tmdbList');
  const imdbList = document.getElementById('imdbList');
  tmdbList.innerHTML = '';
  imdbList.innerHTML = '';

  if(tmdbId){
    TMDB_SERVERS.forEach(s => tmdbList.appendChild(row(s.name, s.build(tmdbId))));
    document.getElementById('tmdbCount').textContent = `${TMDB_SERVERS.length} servers`;
    document.getElementById('tmdbEcho').textContent = `TMDB: ${tmdbId}`;
  } else {
    tmdbList.innerHTML = '<div class="empty">Enter a TMDB ID to build this list.</div>';
    document.getElementById('tmdbCount').textContent = '0 servers';
    document.getElementById('tmdbEcho').textContent = '-';
  }

  if(imdbId){
    IMDB_SERVERS.forEach(s => imdbList.appendChild(row(s.name, s.build(imdbId))));
    document.getElementById('imdbCount').textContent = `${IMDB_SERVERS.length} servers`;
    document.getElementById('imdbEcho').textContent = `IMDB: ${imdbId}`;
  } else {
    imdbList.innerHTML = '<div class="empty">Enter an IMDB ID to build this list.</div>';
    document.getElementById('imdbCount').textContent = '0 servers';
    document.getElementById('imdbEcho').textContent = '-';
  }
}

async function generate(){
  let tmdbId = extractTmdbId(document.getElementById('tmdbInput').value);
  let imdbId = extractImdbId(document.getElementById('imdbInput').value);
  const btn = document.getElementById('genBtn');

  if(!tmdbId && !imdbId){
    setStatus('Please enter at least one ID or search for a movie.', 'err');
    renderLists(null, null);
    return;
  }

  // Auto-convert missing side
  if(tmdbId && !imdbId){
    btn.disabled = true;
    setStatus('Resolving IMDB ID...', 'busy');
    try{
      imdbId = await tmdbToImdb(tmdbId);
      document.getElementById('imdbInput').value = imdbId;
      setStatus(`Success! Lists generated.`, 'ok');
    }catch(e){
      setStatus(e.message, 'err');
    }
    btn.disabled = false;
  } else if(imdbId && !tmdbId){
    btn.disabled = true;
    setStatus('Resolving TMDB ID...', 'busy');
    try{
      tmdbId = await imdbToTmdb(imdbId);
      document.getElementById('tmdbInput').value = tmdbId;
      setStatus(`Success! Lists generated.`, 'ok');
    }catch(e){
      setStatus(e.message, 'err');
    }
    btn.disabled = false;
  } else {
    setStatus('Lists Generated successfully.', 'ok');
  }

  renderLists(tmdbId, imdbId);
}

function copyUrl(btn, url){
  navigator.clipboard.writeText(url).then(()=>{
    const old = btn.textContent;
    btn.textContent = 'Copied!';
    btn.classList.add('copied');
    setTimeout(()=>{ btn.textContent = old; btn.classList.remove('copied'); }, 1200);
  });
}

function loadPreview(name, url){
  document.getElementById('previewWrap').classList.remove('hidden');
  document.getElementById('previewLabel').textContent = `${name} — ${url}`;
  document.getElementById('previewFrame').src = url;
  document.getElementById('previewWrap').scrollIntoView({behavior:'smooth', block:'start'});
}

function closePreview(){
  document.getElementById('previewFrame').src = 'about:blank';
  document.getElementById('previewWrap').classList.add('hidden');
}

renderLists(null, null);
renderTVList(null, 1, 1);

// Allow pressing 'Enter' on search inputs
document.getElementById('searchQuery').addEventListener('keypress', function (e) {
    if (e.key === 'Enter') searchMovies();
});
document.getElementById('searchYear').addEventListener('keypress', function (e) {
    if (e.key === 'Enter') searchMovies();
});
</script>
